name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Default Scheme
        id: scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo "scheme=$default" >> $GITHUB_OUTPUT
          echo "Using default scheme: $default"

      - name: Resolve build target
        id: target
        run: |
          if ls -A | grep -qi '\.xcworkspace$'; then
            filetype="workspace"
            file=$(ls -A | grep -i '\.xcworkspace$' | head -1 | awk '{$1=$1;print}')
          else
            filetype="project"
            file=$(ls -A | grep -i '\.xcodeproj$' | head -1 | awk '{$1=$1;print}')
          fi
          device=$(xcrun simctl list devices available | grep -m1 "iPhone" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          if [ -z "$device" ]; then
            echo "Error: No iPhone simulator found"
            exit 1
          fi
          echo "filetype=$filetype" >> $GITHUB_OUTPUT
          echo "file=$file" >> $GITHUB_OUTPUT
          echo "device=$device" >> $GITHUB_OUTPUT

      - name: Build
        env:
          scheme: ${{ steps.scheme.outputs.scheme }}
          platform: iOS Simulator
        run: |
          destination="platform=$platform,id=${{ steps.target.outputs.device }}"
          xcodebuild build-for-testing \
            -scheme "$scheme" \
            -${{ steps.target.outputs.filetype }} "${{ steps.target.outputs.file }}" \
            -destination "$destination"

      - name: Test
        env:
          scheme: ${{ steps.scheme.outputs.scheme }}
          platform: iOS Simulator
        run: |
          destination="platform=$platform,id=${{ steps.target.outputs.device }}"
          xcodebuild test-without-building \
            -scheme "$scheme" \
            -${{ steps.target.outputs.filetype }} "${{ steps.target.outputs.file }}" \
            -destination "$destination"