name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes

      - name: Download iOS Simulator Runtime (если не установлен)
        run: |
          if ! xcrun simctl list runtimes | grep -q "iOS"; then
            echo "No iOS runtime found, downloading..."
            sudo xcodebuild -downloadPlatform iOS
          fi

      - name: Set Default Scheme
        id: scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo "scheme=$default" >> $GITHUB_OUTPUT
          echo "Using scheme: $default"

      - name: Resolve build target and simulator
        id: target
        run: |
          if ls | grep -qi '\.xcworkspace$'; then
            filetype="workspace"
            file=$(ls | grep -i '\.xcworkspace$' | head -1 | awk '{$1=$1;print}')
          else
            filetype="project"
            file=$(ls | grep -i '\.xcodeproj$' | head -1 | awk '{$1=$1;print}')
          fi
          device=$(xcrun simctl list devices available | grep "iPhone" | tail -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "filetype=$filetype" >> $GITHUB_OUTPUT
          echo "file=$file" >> $GITHUB_OUTPUT
          echo "device=$device" >> $GITHUB_OUTPUT
          echo "Found simulator: $device"

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -${{ steps.target.outputs.filetype }} "${{ steps.target.outputs.file }}" \
            -destination "platform=iOS Simulator,id=${{ steps.target.outputs.device }}"

      - name: Test
        run: |
          xcodebuild test-without-building \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -${{ steps.target.outputs.filetype }} "${{ steps.target.outputs.file }}" \
            -destination "platform=iOS Simulator,id=${{ steps.target.outputs.device }}"