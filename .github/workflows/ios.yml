name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default > default
          echo "Using default scheme: $default"

      - name: Build
        env:
          scheme: ${{ 'default' }}
          platform: ${{ 'iOS Simulator' }}
        run: |
          device=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          if [ -z "$device" ]; then
            device=$(xcrun simctl list devices available | grep -m1 "iPhone" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
            if [ -z "$device" ]; then
              echo "Error: No iPhone simulator found"
              exit 1
            fi
            destination="platform=$platform,id=$device"
          else
            destination="platform=$platform,name=$device"
          fi

          if [ "$scheme" = "default" ]; then scheme=$(cat default); fi
          if ls -A | grep -qi '\.xcworkspace$'; then
            filetype_parameter="workspace"
            file_to_build=$(ls -A | grep -i '\.xcworkspace$' | head -1)
          else
            filetype_parameter="project"
            file_to_build=$(ls -A | grep -i '\.xcodeproj$' | head -1)
          fi
          file_to_build=$(echo $file_to_build | awk '{$1=$1;print}')

          echo "Building scheme: $scheme, destination: $destination"
          xcodebuild build-for-testing \
            -scheme "$scheme" \
            -"$filetype_parameter" "$file_to_build" \
            -destination "$destination"

      - name: Test
        env:
          scheme: ${{ 'default' }}
          platform: ${{ 'iOS Simulator' }}
        run: |
          device=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          if [ -z "$device" ]; then
            device=$(xcrun simctl list devices available | grep -m1 "iPhone" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
            if [ -z "$device" ]; then
              echo "Error: No iPhone simulator found"
              exit 1
            fi
            destination="platform=$platform,id=$device"
          else
            destination="platform=$platform,name=$device"
          fi

          if [ "$scheme" = "default" ]; then scheme=$(cat default); fi
          if ls -A | grep -qi '\.xcworkspace$'; then
            filetype_parameter="workspace"
            file_to_build=$(ls -A | grep -i '\.xcworkspace$' | head -1)
          else
            filetype_parameter="project"
            file_to_build=$(ls -A | grep -i '\.xcodeproj$' | head -1)
          fi
          file_to_build=$(echo $file_to_build | awk '{$1=$1;print}')

          echo "Testing scheme: $scheme, destination: $destination"
          xcodebuild test-without-building \
            -scheme "$scheme" \
            -"$filetype_parameter" "$file_to_build" \
            -destination "$destination"
