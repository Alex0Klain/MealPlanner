name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 15
    outputs:
      scheme: ${{ steps.scheme.outputs.scheme }}
      filetype: ${{ steps.target.outputs.filetype }}
      file: ${{ steps.target.outputs.file }}
      device: ${{ steps.target.outputs.device }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set Default Scheme
        id: scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo "scheme=$default" >> $GITHUB_OUTPUT
          echo "Using scheme: $default"

      - name: Resolve build target and simulator
        id: target
        run: |
          if ls | grep -qi '\.xcworkspace$'; then
            filetype="workspace"
            file=$(ls | grep -i '\.xcworkspace$' | head -1 | awk '{$1=$1;print}')
          else
            filetype="project"
            file=$(ls | grep -i '\.xcodeproj$' | head -1 | awk '{$1=$1;print}')
          fi
          device=$(xcrun simctl list devices available | grep "iPhone" | tail -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "filetype=$filetype" >> $GITHUB_OUTPUT
          echo "file=$file" >> $GITHUB_OUTPUT
          echo "device=$device" >> $GITHUB_OUTPUT
          echo "Found simulator: $device"

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -${{ steps.target.outputs.filetype }} "${{ steps.target.outputs.file }}" \
            -destination "platform=iOS Simulator,id=${{ steps.target.outputs.device }}" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: DerivedData/Build/Products/
          retention-days: 1

  unit-test:
    runs-on: macos-26
    timeout-minutes: 10
    needs: build

    steps:
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: DerivedData/Build/Products/

      - name: Unit Tests
        run: |
          xctestrun=$(find DerivedData -name "*.xctestrun" | head -1)
          echo "Using xctestrun: $xctestrun"
          xcodebuild test-without-building \
            -xctestrun "$xctestrun" \
            -destination "platform=iOS Simulator,id=${{ needs.build.outputs.device }}" \
            -skip-testing MealPlannerUITests \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 60 \
            -maximum-test-execution-time-allowance 120 \
            CODE_SIGNING_ALLOWED=NO

  ui-test:
    runs-on: macos-26
    timeout-minutes: 30
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: DerivedData/Build/Products/

      - name: UI Tests
        run: |
          xctestrun=$(find DerivedData -name "*.xctestrun" | head -1)
          echo "Using xctestrun: $xctestrun"
          xcodebuild test-without-building \
            -xctestrun "$xctestrun" \
            -destination "platform=iOS Simulator,id=${{ needs.build.outputs.device }}" \
            -only-testing MealPlannerUITests \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 60 \
            -maximum-test-execution-time-allowance 120 \
            CODE_SIGNING_ALLOWED=NO